name: Lean CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Lake build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Lean project
        uses: leanprover/lean-action@v1
        with:
          build: true
          test: false
          lint: false

